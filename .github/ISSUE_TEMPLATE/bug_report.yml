name: Bug report
description: Report a reproducible problem in the kit, installer, templates, or validator
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please include the smallest reproducible setup you can.
  - type: input
    id: area
    attributes:
      label: Area
      placeholder: "installer / validator / codex template / claude template / obsidian template"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation output
      description: Paste the output of Validate-AgentWorkspaceKit.ps1 if relevant
