<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bgPanel" x1="48" y1="48" x2="1232" y2="592" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121A31"/>
      <stop offset="1" stop-color="#0F1628"/>
    </linearGradient>
    <linearGradient id="leftGlow" x1="90" y1="0" x2="420" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D61D1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2D61D1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rightGlow" x1="980" y1="40" x2="1240" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22B49A" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#22B49A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="#0B1020"/>
  <rect width="1280" height="640" fill="url(#leftGlow)"/>
  <rect width="1280" height="640" fill="url(#rightGlow)"/>
  <rect x="48" y="48" width="1184" height="544" rx="30" fill="url(#bgPanel)" stroke="#2E3B62"/>

  <text x="88" y="144" fill="#F4F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700">Agent Atlas</text>
  <text x="88" y="194" fill="#B6C8EC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600">Portable dual-agent workspace harness with a clean knowledge and verification layer.</text>

  <rect x="88" y="242" width="190" height="44" rx="22" fill="#162441" stroke="#30518C"/>
  <text x="120" y="270" fill="#E2EBFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Codex + Claude</text>
  <rect x="292" y="242" width="144" height="44" rx="22" fill="#162441" stroke="#346B89"/>
  <text x="325" y="270" fill="#E2EBFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Windows first</text>
  <rect x="450" y="242" width="138" height="44" rx="22" fill="#162441" stroke="#7756C1"/>
  <text x="483" y="270" fill="#E2EBFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Validated</text>

  <rect x="88" y="330" width="320" height="148" rx="22" fill="#111C34" stroke="#355184"/>
  <rect x="432" y="330" width="320" height="148" rx="22" fill="#112033" stroke="#2F6A63"/>
  <rect x="776" y="330" width="320" height="148" rx="22" fill="#171B35" stroke="#594C8A"/>

  <text x="118" y="374" fill="#F4F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Workspace</text>
  <text x="118" y="410" fill="#A5BBE3" font-family="Segoe UI, Arial, sans-serif" font-size="20">Lean roots, project-local rules, clean bootstrap.</text>

  <text x="462" y="374" fill="#F4F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Knowledge</text>
  <text x="462" y="410" fill="#A6D7D0" font-family="Segoe UI, Arial, sans-serif" font-size="20">Draft inbox, curated notes, compiled indexes.</text>

  <text x="806" y="374" fill="#F4F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Verification</text>
  <text x="806" y="410" fill="#C9BDF2" font-family="Segoe UI, Arial, sans-serif" font-size="20">Validator, smoke tests, scenario simulations.</text>

  <rect x="88" y="520" width="1040" height="44" rx="20" fill="#0E1528" stroke="#273556"/>
  <text x="120" y="548" fill="#EAF2FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Install -> Work -> Capture -> Curate -> Compile -> Validate -> Release</text>
</svg>
