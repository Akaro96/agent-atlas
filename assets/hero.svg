<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="panel" x1="120" y1="90" x2="1480" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121A31"/>
      <stop offset="1" stop-color="#0F1628"/>
    </linearGradient>
    <linearGradient id="workspaceAccent" x1="110" y1="340" x2="510" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4C82FF"/>
      <stop offset="1" stop-color="#6FA9FF"/>
    </linearGradient>
    <linearGradient id="knowledgeAccent" x1="540" y1="340" x2="940" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C7A8"/>
      <stop offset="1" stop-color="#6EDFC7"/>
    </linearGradient>
    <linearGradient id="verificationAccent" x1="970" y1="340" x2="1370" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9A78FF"/>
      <stop offset="1" stop-color="#C5AEFF"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 180) rotate(20) scale(420 220)">
      <stop stop-color="#234AA4" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#234AA4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1280 160) rotate(-18) scale(380 220)">
      <stop stop-color="#19A98A" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#19A98A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="#0B1020"/>
  <rect width="1600" height="900" fill="url(#glowLeft)"/>
  <rect width="1600" height="900" fill="url(#glowRight)"/>

  <rect x="60" y="60" width="1480" height="780" rx="32" fill="url(#panel)" stroke="#2B3A61"/>

  <text x="110" y="145" fill="#F4F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700">Agent Atlas</text>
  <text x="110" y="195" fill="#B5C7EC" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="600">Portable dual-agent workspace harness for Codex, Claude Code, and an optional knowledge vault.</text>
  <text x="110" y="230" fill="#8EA5D0" font-family="Segoe UI, Arial, sans-serif" font-size="22">Built for people who want a serious daily-driver setup without giant-framework sprawl, repo clutter, or private-state leakage.</text>

  <g>
    <rect x="110" y="265" width="182" height="44" rx="22" fill="#162441" stroke="#30518C"/>
    <text x="145" y="293" fill="#DAE7FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Codex + Claude</text>
    <rect x="308" y="265" width="152" height="44" rx="22" fill="#162441" stroke="#2F6C89"/>
    <text x="346" y="293" fill="#DAE7FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Windows first</text>
    <rect x="476" y="265" width="192" height="44" rx="22" fill="#162441" stroke="#45744D"/>
    <text x="506" y="293" fill="#DAE7FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Knowledge optional</text>
    <rect x="684" y="265" width="154" height="44" rx="22" fill="#162441" stroke="#7756C1"/>
    <text x="719" y="293" fill="#DAE7FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Smoke tested</text>
  </g>

  <g>
    <rect x="110" y="340" width="400" height="290" rx="24" fill="#111C34" stroke="#2F4976"/>
    <rect x="110" y="340" width="400" height="14" rx="14" fill="url(#workspaceAccent)"/>
    <circle cx="158" cy="405" r="22" fill="#173056"/>
    <rect x="146" y="394" width="24" height="6" rx="3" fill="#8BB5FF"/>
    <rect x="146" y="404" width="24" height="6" rx="3" fill="#8BB5FF"/>
    <rect x="146" y="414" width="24" height="6" rx="3" fill="#8BB5FF"/>
    <text x="192" y="412" fill="#F4F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Workspace</text>
    <text x="150" y="455" fill="#A0B7E0" font-family="Segoe UI, Arial, sans-serif" font-size="20">Keep the umbrella root lean, then delegate downward.</text>

    <circle cx="154" cy="498" r="6" fill="#6FA9FF"/>
    <text x="174" y="505" fill="#DCE7FF" font-family="Segoe UI, Arial, sans-serif" font-size="22">Short root instructions, not giant manuals</text>
    <circle cx="154" cy="538" r="6" fill="#6FA9FF"/>
    <text x="174" y="545" fill="#DCE7FF" font-family="Segoe UI, Arial, sans-serif" font-size="22">Project-local rules where the real work happens</text>
    <circle cx="154" cy="578" r="6" fill="#6FA9FF"/>
    <text x="174" y="585" fill="#DCE7FF" font-family="Segoe UI, Arial, sans-serif" font-size="22">Bootstrap clean software, AI, or research projects</text>

    <rect x="150" y="600" width="104" height="32" rx="10" fill="#162746"/>
    <text x="166" y="621" fill="#CFE1FF" font-family="Consolas, monospace" font-size="16">AGENTS.md</text>
    <rect x="264" y="600" width="112" height="32" rx="10" fill="#162746"/>
    <text x="280" y="621" fill="#CFE1FF" font-family="Consolas, monospace" font-size="16">CLAUDE.md</text>
    <rect x="386" y="600" width="94" height="32" rx="10" fill="#162746"/>
    <text x="402" y="621" fill="#CFE1FF" font-family="Consolas, monospace" font-size="16">_SHARED</text>
  </g>

  <g>
    <rect x="540" y="340" width="400" height="290" rx="24" fill="#102033" stroke="#2E5D63"/>
    <rect x="540" y="340" width="400" height="14" rx="14" fill="url(#knowledgeAccent)"/>
    <circle cx="588" cy="405" r="22" fill="#123C3A"/>
    <path d="M578 395H598C601.314 395 604 397.686 604 401V417H582C579.791 417 578 415.209 578 413V395Z" fill="#7EE4D1"/>
    <path d="M582 407H598" stroke="#123C3A" stroke-width="2"/>
    <path d="M582 401H598" stroke="#123C3A" stroke-width="2"/>
    <text x="622" y="412" fill="#F4F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Knowledge</text>
    <text x="580" y="455" fill="#A4D7D0" font-family="Segoe UI, Arial, sans-serif" font-size="20">Keep durable context in a vault instead of contaminating repos.</text>

    <circle cx="584" cy="498" r="6" fill="#6EDFC7"/>
    <text x="604" y="505" fill="#DDFBF5" font-family="Segoe UI, Arial, sans-serif" font-size="22">Capture notes in an inbox before they become canon</text>
    <circle cx="584" cy="538" r="6" fill="#6EDFC7"/>
    <text x="604" y="545" fill="#DDFBF5" font-family="Segoe UI, Arial, sans-serif" font-size="22">Promote drafts into decisions, prompts, or reference pages</text>
    <circle cx="584" cy="578" r="6" fill="#6EDFC7"/>
    <text x="604" y="585" fill="#DDFBF5" font-family="Segoe UI, Arial, sans-serif" font-size="22">Compile generated indexes for fast retrieval and review</text>

    <rect x="580" y="600" width="176" height="32" rx="10" fill="#16302F"/>
    <text x="596" y="621" fill="#D7FBF5" font-family="Consolas, monospace" font-size="16">10_Inbox/Agent Drafts</text>
    <rect x="766" y="600" width="132" height="32" rx="10" fill="#16302F"/>
    <text x="782" y="621" fill="#D7FBF5" font-family="Consolas, monospace" font-size="16">40_Decisions</text>
  </g>

  <g>
    <rect x="970" y="340" width="400" height="290" rx="24" fill="#171B35" stroke="#594C8A"/>
    <rect x="970" y="340" width="400" height="14" rx="14" fill="url(#verificationAccent)"/>
    <circle cx="1018" cy="405" r="22" fill="#282154"/>
    <path d="M1008 404L1016 412L1030 398" stroke="#D8CBFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1052" y="412" fill="#F4F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Verification</text>
    <text x="1010" y="455" fill="#C6BAF2" font-family="Segoe UI, Arial, sans-serif" font-size="20">Prove the kit works before you trust it, ship it, or fork it.</text>

    <circle cx="1014" cy="498" r="6" fill="#C5AEFF"/>
    <text x="1034" y="505" fill="#EFE9FF" font-family="Segoe UI, Arial, sans-serif" font-size="22">Validate structure, links, parsing, and path hygiene</text>
    <circle cx="1014" cy="538" r="6" fill="#C5AEFF"/>
    <text x="1034" y="545" fill="#EFE9FF" font-family="Segoe UI, Arial, sans-serif" font-size="22">Run smoke tests and broader scenario simulations</text>
    <circle cx="1014" cy="578" r="6" fill="#C5AEFF"/>
    <text x="1034" y="585" fill="#EFE9FF" font-family="Segoe UI, Arial, sans-serif" font-size="22">Publish release bundles with checksums and CI proof</text>

    <rect x="1010" y="600" width="156" height="32" rx="10" fill="#262349"/>
    <text x="1026" y="621" fill="#EEE6FF" font-family="Consolas, monospace" font-size="16">Validate-...</text>
    <rect x="1176" y="600" width="168" height="32" rx="10" fill="#262349"/>
    <text x="1192" y="621" fill="#EEE6FF" font-family="Consolas, monospace" font-size="16">Smoke + scenarios</text>
  </g>

  <g>
    <rect x="110" y="680" width="1260" height="108" rx="22" fill="#0E1528" stroke="#273556"/>
    <text x="150" y="726" fill="#F2F6FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Install -> Work in projects -> Capture durable notes -> Curate and compile -> Validate and release</text>
    <text x="150" y="760" fill="#8EA5D0" font-family="Segoe UI, Arial, sans-serif" font-size="19">The point is not more magic. The point is a cleaner operating map: operational work, durable knowledge, and proof that the system still works.</text>

    <circle cx="133" cy="722" r="8" fill="#6FA9FF"/>
    <circle cx="392" cy="722" r="8" fill="#6FA9FF"/>
    <circle cx="646" cy="722" r="8" fill="#6EDFC7"/>
    <circle cx="900" cy="722" r="8" fill="#6EDFC7"/>
    <circle cx="1180" cy="722" r="8" fill="#C5AEFF"/>
    <path d="M145 722H380" stroke="#385A99" stroke-width="3"/>
    <path d="M404 722H634" stroke="#385A99" stroke-width="3"/>
    <path d="M658 722H888" stroke="#338373" stroke-width="3"/>
    <path d="M912 722H1168" stroke="#7158BD" stroke-width="3"/>
  </g>
</svg>
