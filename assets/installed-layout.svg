<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" fill="none">
  <rect width="1600" height="980" fill="#0B1020"/>
  <text x="64" y="78" fill="#EEF4FF" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">What a fresh install looks like</text>
  <text x="64" y="116" fill="#90A7D1" font-family="Segoe UI, Arial, sans-serif" font-size="20">A generated workspace, a separate knowledge vault, and two agent runtimes with clear boundaries.</text>

  <rect x="64" y="164" width="1472" height="744" rx="26" fill="#10172A" stroke="#2E3B62"/>
  <rect x="104" y="214" width="420" height="624" rx="22" fill="#131D34" stroke="#355184"/>
  <rect x="590" y="214" width="420" height="624" rx="22" fill="#131D34" stroke="#355184"/>
  <rect x="1076" y="214" width="420" height="624" rx="22" fill="#131D34" stroke="#355184"/>

  <text x="132" y="264" fill="#E9F1FF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Root</text>
  <text x="132" y="302" fill="#91A7D0" font-family="Segoe UI, Arial, sans-serif" font-size="18">Generated by the installer</text>
  <text x="132" y="356" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">START HERE.md</text>
  <text x="132" y="394" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">.codex/</text>
  <text x="132" y="432" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">.claude/</text>
  <text x="132" y="470" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">AI-Workspace/</text>
  <text x="132" y="508" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">Knowledge-Vault/</text>
  <text x="132" y="572" fill="#8FD7B4" font-family="Segoe UI, Arial, sans-serif" font-size="18">+ one install creates the whole mapped structure</text>
  <text x="132" y="610" fill="#8FD7B4" font-family="Segoe UI, Arial, sans-serif" font-size="18">+ no private machine state required</text>

  <text x="618" y="264" fill="#E9F1FF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Workspace</text>
  <text x="618" y="302" fill="#91A7D0" font-family="Segoe UI, Arial, sans-serif" font-size="18">Operational root for real work</text>
  <text x="618" y="356" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">README.md</text>
  <text x="618" y="394" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">AGENTS.md</text>
  <text x="618" y="432" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">CLAUDE.md</text>
  <text x="618" y="470" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">_INBOX/</text>
  <text x="618" y="508" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">_SHARED/tools/</text>
  <text x="618" y="546" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">active/reports/</text>
  <text x="618" y="584" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">Project-Beta/</text>
  <text x="618" y="648" fill="#8FD7B4" font-family="Segoe UI, Arial, sans-serif" font-size="18">+ project work stays out of the umbrella root</text>
  <text x="618" y="686" fill="#8FD7B4" font-family="Segoe UI, Arial, sans-serif" font-size="18">+ helper tools live with the workspace</text>

  <text x="1104" y="264" fill="#E9F1FF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Knowledge Vault</text>
  <text x="1104" y="302" fill="#91A7D0" font-family="Segoe UI, Arial, sans-serif" font-size="18">Durable notes, curation, and compiled views</text>
  <text x="1104" y="356" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">00 Home.md</text>
  <text x="1104" y="394" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">00_System/</text>
  <text x="1104" y="432" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">10_Inbox/Agent Drafts/</text>
  <text x="1104" y="470" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">30_Knowledge/</text>
  <text x="1104" y="508" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">40_Decisions/</text>
  <text x="1104" y="546" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">_Templates/</text>
  <text x="1104" y="610" fill="#8FD7B4" font-family="Segoe UI, Arial, sans-serif" font-size="18">+ durable notes are separate from repo clutter</text>
  <text x="1104" y="648" fill="#8FD7B4" font-family="Segoe UI, Arial, sans-serif" font-size="18">+ compile step creates index views and digests</text>
</svg>
